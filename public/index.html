<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Link Shortener</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(90deg, #6c63ff, #48cfad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.sub {
      color: #aaa;
      margin-bottom: 2rem;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 500px;
    }

    input {
      width: 100%;
      padding: 0.8rem 1rem;
      border-radius: 10px;
      border: 1px solid #333;
      background: #111;
      color: #fff;
      font-size: 1rem;
      margin-bottom: 1rem;
    }

    input:focus {
      outline: none;
      border-color: #6c63ff;
    }

    button {
      width: 100%;
      padding: 0.8rem;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, #6c63ff, #48cfad);
      color: #fff;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.85; }

    .result {
      margin-top: 1.5rem;
      display: none;
    }

    .result p {
      color: #aaa;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }

    .result-box {
      display: flex;
      gap: 0.5rem;
    }

    .result-box input {
      margin: 0;
      flex: 1;
      color: #48cfad;
    }

    .result-box button {
      width: auto;
      padding: 0.8rem 1.2rem;
    }

    .error {
      color: #ff6b6b;
      font-size: 0.9rem;
      margin-top: 0.5rem;
      display: none;
    }
  </style>
</head>
<body>

  <h1>⚡YOOI ShortLink</h1>
  <p class="sub">Perpendek link kamu secara gratis</p>

  <div class="card">
    <input type="url" id="urlInput" placeholder="Masukkan link panjang di sini..." />
    <button onclick="shortenLink()">Perpendek Sekarang</button>
    <p class="error" id="errorMsg">❌ Link tidak valid!</p>

    <div class="result" id="result">
      <p>✅ Link berhasil diperpendek:</p>
      <div class="result-box">
        <input type="text" id="shortUrl" readonly />
        <button onclick="copyLink()">Copy</button>
      </div>
    </div>
  </div>

  <script>
    async function shortenLink() {
      const url = document.getElementById('urlInput').value.trim()
      const errorMsg = document.getElementById('errorMsg')
      const result = document.getElementById('result')

      errorMsg.style.display = 'none'
      result.style.display = 'none'
if (!url) {
  errorMsg.style.display = 'block'
  return
}

      const res = await fetch('/api/shorten', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ original_url: url })
      })

      const data = await res.json()

      if (data.short_url) {
        document.getElementById('shortUrl').value = data.short_url
        result.style.display = 'block'
      } else {
        errorMsg.style.display = 'block'
      }
    }

    function copyLink() {
      const shortUrl = document.getElementById('shortUrl')
      shortUrl.select()
      document.execCommand('copy')
      alert('✅ Link berhasil dicopy!')
    }
  </script>

</body>
</html>
