<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Mengalihkan...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    h2 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #aaa; margin-bottom: 2rem; }

    .timer {
      font-size: 3rem;
      font-weight: bold;
      color: #6c63ff;
      margin-bottom: 1rem;
    }

    button {
      padding: 0.8rem 2rem;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, #6c63ff, #48cfad);
      color: #fff;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      display: none;
    }

    button:hover { opacity: 0.85; }

    /* Area iklan Monetag */
    .ad-area {
      margin: 2rem 0;
      min-height: 100px;
    }
  </style>
</head>
<body>

  <h2>⏳ Sedang mengalihkan...</h2>
  <p>Halaman akan diarahkan secara otomatis</p>

  <div class="timer" id="timer">5</div>

  <!-- Taruh script iklan Monetag di sini -->
  <div class="ad-area">
    <!-- MONETAG AD CODE HERE -->
  </div>

  <button id="skipBtn" onclick="redirect()">Lewati →</button>

  <script>
    const params = new URLSearchParams(window.location.search)
    const targetUrl = params.get('url')

    let count = 5

    const interval = setInterval(() => {
      count--
      document.getElementById('timer').textContent = count

      if (count <= 0) {
        clearInterval(interval)
        redirect()
      }

      if (count <= 2) {
        document.getElementById('skipBtn').style.display = 'inline-block'
      }
    }, 1000)

    function redirect() {
      if (targetUrl) {
        window.location.href = targetUrl
      }
    }
  </script>

</body>
</html>
